version: '3.8'

services:
  # ─────────────────────────────────────────────
  # MongoDB — Primary data store for project/sprint/PR data
  # ─────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: drp-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: delivery_risk_db
    volumes:
      - mongodb_data:/data/db
      - ./database/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - delivery-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # PostgreSQL — ML feature store and predictions
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: drp-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drp_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-ml_feature_store}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - delivery-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drp_user} -d ${POSTGRES_DB:-ml_feature_store}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Backend — Node.js + Express API Server
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drp-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/delivery_risk_db
      POSTGRES_URI: postgresql://${POSTGRES_USER:-drp_user}:${POSTGRES_PASSWORD:-drp_secret_2024}@postgres:5432/${POSTGRES_DB:-ml_feature_store}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      ML_SERVICE_URL: http://ml-service:8000
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - delivery-network
    volumes:
      - ./backend/src:/app/src

  # ─────────────────────────────────────────────
  # ML Service — Python + FastAPI for all ML/NLP
  # ─────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: drp-ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MODEL_PATH: ./app/models/saved/
      PYTHONUNBUFFERED: 1
    networks:
      - delivery-network
    volumes:
      - ./ml-service/app:/app/app

  # ─────────────────────────────────────────────
  # Frontend — React + Vite dev server
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: drp-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - delivery-network
    volumes:
      - ./frontend/src:/app/src

# ─────────────────────────────────────────────
# Volumes — Persistent data storage
# ─────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local
  postgres_data:
    driver: local

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  delivery-network:
    driver: bridge
